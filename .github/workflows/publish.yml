name: Rebuild PyPI Index

on:
  push:
    branches: [main]
    paths:
      - config.toml
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  repository_dispatch:
    types: [rebuild-index]

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .

      - name: Rebuild index
        run: python -m gds_idea_pypi --output _site/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add .nojekyll
        run: touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
