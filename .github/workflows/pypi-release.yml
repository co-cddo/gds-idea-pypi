# Reusable workflow for package repos.
#
# Add this to your package repo's release workflow:
#
#   jobs:
#     publish:
#       uses: co-cddo/gds-idea-pypi/.github/workflows/pypi-release.yml@main
#       secrets: inherit
#
# Prerequisites:
#   - Your repo must have a pyproject.toml with a [build-system] section.
#   - The workflow is triggered by a published release (tag push + release creation).
#   - To trigger the index rebuild, set an org-level secret called
#     PYPI_INDEX_TOKEN (a PAT with `repo` scope on co-cddo/gds-idea-pypi),
#     or set it as a repo-level secret.

name: Build & Publish to PyPI Index

on:
  workflow_call:
    secrets:
      PYPI_INDEX_TOKEN:
        description: "PAT with repo scope on co-cddo/gds-idea-pypi (for triggering index rebuild)"
        required: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for gh release upload
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Build wheel and sdist
        run: uv build

      - name: Upload artifacts to GitHub Release
        run: gh release upload "${{ github.ref_name }}" dist/*.whl dist/*.tar.gz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Uncomment once PYPI_INDEX_TOKEN is configured as an org or repo secret
